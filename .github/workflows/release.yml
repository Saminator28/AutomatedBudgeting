name: Release with Test Report

on:
  release:
    types: [created, published]
  workflow_dispatch:  # Allow manual trigger

jobs:
  attach-test-report:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Get latest test results from main branch
      uses: dawidd6/action-download-artifact@v3
      with:
        workflow: ci.yml
        branch: main
        name: test-results-*
        name_is_regexp: true
        path: ./test-results
        check_artifacts: true
        search_artifacts: true
    
    - name: Find latest test report
      id: find-report
      run: |
        # Find the most recent test report
        LATEST_DIR=$(ls -t test-results/ | head -1)
        echo "Using test results from: $LATEST_DIR"
        
        # Copy files to root for easier access
        cp "test-results/$LATEST_DIR/test_report.txt" ./test_report.txt || echo "No detailed report found"
        cp "test-results/$LATEST_DIR/test_summary.txt" ./test_summary.txt || echo "No summary found"
        cp "test-results/$LATEST_DIR/badge.txt" ./badge.txt || echo "No badge found"
        
        # Check if files exist
        if [ ! -f test_summary.txt ]; then
          echo "⚠️ No test results found from CI - tests may not have run on main branch"
          echo "Tests run: Unknown" > test_summary.txt
          echo "Tests run: Unknown" > test_report.txt
        fi
    
    - name: Create formatted test summary for release
      run: |
        echo "# Test Report - Release ${{ github.event.release.tag_name }}" > test_summary_release.md
        echo "" >> test_summary_release.md
        echo "**Release Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> test_summary_release.md
        echo "**Commit:** ${{ github.sha }}" >> test_summary_release.md
        echo "**Test Results From:** Latest CI run on main branch" >> test_summary_release.md
        echo "" >> test_summary_release.md
        echo "## Test Results" >> test_summary_release.md
        echo "\`\`\`" >> test_summary_release.md
        cat test_summary.txt >> test_summary_release.md
        echo "\`\`\`" >> test_summary_release.md
        echo "" >> test_summary_release.md
        echo "---" >> test_summary_release.md
        echo "*These tests were run automatically on the main branch via CI.*" >> test_summary_release.md
    
    - name: Attach test report to release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./test_report.txt
        asset_name: test-report-${{ github.event.release.tag_name }}.txt
        asset_content_type: text/plain
    
    - name: Attach markdown summary to release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./test_summary_release.md
        asset_name: test-summary-${{ github.event.release.tag_name }}.md
        asset_content_type: text/markdown
    
    - name: Add test status to release notes
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          
          let testSummary = 'Test results not available';
          if (fs.existsSync('test_summary.txt')) {
            const testReport = fs.readFileSync('test_summary.txt', 'utf8');
            const lines = testReport.split('\n');
            testSummary = lines.find(l => l.includes('Tests run:')) || 'Test results not found';
          }
          
          let badge = '';
          if (fs.existsSync('badge.txt')) {
            badge = fs.readFileSync('badge.txt', 'utf8').trim();
          }
          
          const release = await github.rest.repos.getRelease({
            owner: context.repo.owner,
            repo: context.repo.repo,
            release_id: context.payload.release.id
          });
          
          const testInfo = badge ? `**${badge}**` : testSummary;
          const newBody = `${release.data.body}\n\n---\n\n## 🧪 Test Report\n\n${testInfo}\n\n📄 See attached test reports for full details.\n\n*Tests run automatically via CI on main branch.*`;
          
          await github.rest.repos.updateRelease({
            owner: context.repo.owner,
            repo: context.repo.repo,
            release_id: context.payload.release.id,
            body: newBody
          });

