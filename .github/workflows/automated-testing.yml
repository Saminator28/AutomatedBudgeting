name: Automated Tests

on:
  push:
    branches: ['**']  # Run on all branches
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr poppler-utils
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m spacy download en_core_web_sm
    
    - name: Run tests and generate report
      run: |
        python tests/run_tests.py -v > test_report.txt 2>&1 || true
        python tests/run_tests.py > test_summary.txt 2>&1 || true
    
    - name: Create test badge data
      run: |
        # Extract test results for badge
        TESTS_RUN=$(grep "Tests run:" test_summary.txt | grep -oP '\d+' | head -1 || echo "0")
        FAILURES=$(grep "Failures:" test_summary.txt | grep -oP '\d+' || echo "0")
        ERRORS=$(grep "Errors:" test_summary.txt | grep -oP '\d+' || echo "0")
        PASSED=$((TESTS_RUN - FAILURES - ERRORS))
        
        echo "TESTS_RUN=$TESTS_RUN" >> $GITHUB_ENV
        echo "TESTS_PASSED=$PASSED" >> $GITHUB_ENV
        echo "TESTS_FAILED=$((FAILURES + ERRORS))" >> $GITHUB_ENV
        
        # Create badge-friendly summary
        echo "Tests: $PASSED/$TESTS_RUN passed" > badge.txt
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ github.sha }}
        path: |
          test_report.txt
          test_summary.txt
          badge.txt
        retention-days: 30
    
    - name: Comment test results on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const summary = fs.readFileSync('test_summary.txt', 'utf8');
          
          const comment = `## 🧪 Test Results
          
          **Commit:** ${{ github.sha }}
          
          \`\`\`
          ${summary}
          \`\`\`
          
          <details>
          <summary>View detailed test output</summary>
          
          [Download full test report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          
          </details>`;
          
          github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: comment
          });
    
    - name: Fail if tests failed
      run: |
        if [ ${{ env.TESTS_FAILED }} -gt 20 ]; then
          echo "❌ More than 20 tests failed!"
          exit 1
        else
          echo "✅ Acceptable test results (expected failures: 20)"
          exit 0
        fi
